<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse recently played songs on Northern Dial and search our catalog">
    <meta name="theme-color" content="#CC3333">
    <title>Browse Songs - Northern Dial</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

    body {
        font-family: 'Roboto Condensed', sans-serif;
        color: #1a1a1a;
        transition: background 0.3s ease;
    }

    .header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: white;
        backdrop-filter: blur(10px);
        border-bottom: 4px solid #C33;
        padding: 15px 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .header-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap;
    }

    .logo-link {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: #C33;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.5rem;
        letter-spacing: 3px;
        transition: transform 0.3s ease;
        white-space: nowrap;
    }

    .logo-link:hover {
        transform: scale(1.05);
    }

    .back-arrow {
        font-size: 2rem;
        margin-right: 10px;
        color: #C33;
    }

    .search-container {
        flex: 1;
        min-width: 200px;
        max-width: 500px;
        position: relative;
    }

    .search-input {
        width: 100%;
        padding: 15px 20px;
        font-size: 1.1rem;
        font-family: 'Roboto Condensed', sans-serif;
        border: 3px solid #C33;
        border-radius: 8px;
        background: white;
        color: #1a1a1a;
        outline: none;
        transition: all 0.3s ease;
    }

    .search-input:focus {
        background: #f9f9f9;
        box-shadow: 0 0 20px rgba(195, 51, 51, 0.3);
    }

    .catalog-info {
        color: #666;
        font-size: 0.9rem;
        text-align: right;
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    .loading {
        text-align: center;
        padding: 100px 20px;
        font-size: 1.5rem;
        color: #C33;
    }

    .catalog-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 30px;
        margin-top: 20px;
    }

    @media (min-width: 640px) {
        .catalog-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (min-width: 1024px) {
        .catalog-grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    @media (min-width: 1400px) {
        .catalog-grid {
            grid-template-columns: repeat(4, 1fr);
        }
    }

    .album-card {
        background: white;
        border: 4px solid #1a1a1a;
        border-radius: 12px;
        padding: 20px;
        transition: all 0.4s ease;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .album-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        border-color: #C33;
    }

    .album-art {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 8px;
        object-fit: cover;
        margin-bottom: 15px;
        background: #e0e0e0;
        border: 2px solid #ddd;
    }

    .album-art-placeholder {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 8px;
        background: linear-gradient(135deg, #e0e0e0, #f5f5f5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
        color: #999;
        margin-bottom: 15px;
        border: 2px solid #ddd;
    }

    .album-title {
        font-family: 'Oswald', sans-serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 8px;
        line-height: 1.3;
    }

    .album-artist {
        font-size: 1rem;
        color: #666;
        margin-bottom: 15px;
    }

    .request-btn {
        width: 100%;
        background: linear-gradient(135deg, #C33, #8B2323);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: 'Roboto Condensed', sans-serif;
    }

    .request-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(195, 51, 51, 0.4);
    }

    .request-btn:active {
        transform: scale(0.98);
    }

    .request-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
    }

    .empty-state {
        text-align: center;
        padding: 100px 20px;
    }

    .empty-state-icon {
        font-size: 5rem;
        margin-bottom: 20px;
        opacity: 0.3;
    }

    .empty-state-text {
        font-size: 1.5rem;
        color: #666;
        font-family: 'Oswald', sans-serif;
    }

    .status-message {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: rgba(0, 180, 0, 0.95);
        color: white;
        padding: 20px 30px;
        border-radius: 12px;
        font-weight: 700;
        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        z-index: 1000;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.4s ease;
    }

    .status-message.show {
        opacity: 1;
        transform: translateY(0);
    }

    .status-message.error {
        background: rgba(195, 51, 51, 0.95);
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .searching-spinner {
        display: inline-block;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: 
            radial-gradient(circle at center, #1a1a1a 0%, #1a1a1a 20%, transparent 20%, transparent 22%, #1a1a1a 22%, #1a1a1a 40%, transparent 40%),
            conic-gradient(from 0deg, #1a1a1a 0deg, #1a1a1a 30deg, transparent 30deg, transparent 60deg, #1a1a1a 60deg, #1a1a1a 90deg, transparent 90deg, transparent 120deg, #1a1a1a 120deg, #1a1a1a 150deg, transparent 150deg, transparent 180deg, #1a1a1a 180deg, #1a1a1a 210deg, transparent 210deg, transparent 240deg, #1a1a1a 240deg, #1a1a1a 270deg, transparent 270deg, transparent 300deg, #1a1a1a 300deg, #1a1a1a 330deg, transparent 330deg, transparent 360deg);
        border: 3px solid #C33;
        animation: spin 1s linear infinite;
        position: relative;
    }

    .searching-spinner::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 12px;
        height: 12px;
        background: #C33;
        border-radius: 50%;
    }

    @media (max-width: 639px) {
        .header {
            padding: 15px;
        }

        .header-content {
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .logo-link {
            justify-content: center;
            width: 100%;
        }

        .logo-link img {
            height: 60px !important;
            margin: 0 10px !important;
        }

        .back-arrow {
            font-size: 1.5rem !important;
        }

        .search-container {
            width: 100%;
            order: 2;
        }

        .catalog-info {
            text-align: center;
            width: 100%;
            order: 3;
        }

        .status-message {
            left: 20px;
            right: 20px;
            bottom: 20px;
        }

        .container > div:first-child {
            padding: 20px 15px !important;
        }

        .container > div:first-child h1 {
            font-size: 1.8rem !important;
            letter-spacing: 2px !important;
        }

        .container > div:first-child p {
            font-size: 0.85rem !important;
        }

        .container {
            padding: 20px 15px;
        }
    }
</style>

</head>
<body>
    <div class="header">
        <div class="header-content">
            <a href="index.html" class="logo-link">
                <span class="back-arrow">←</span>
                <img src="https://i.imgur.com/XIAPd0N.png" alt="Northern Dial" style="height: 120px; vertical-align: middle; margin: 0 15px;">
            </a>
            <div class="search-container">
                <input type="text" 
                       class="search-input" 
                       id="searchInput" 
                       placeholder="Search catalog..."
                       autocomplete="off">
            </div>
            <div class="catalog-info">
                <div id="catalogCount">Loading...</div>
            </div>
        </div>
    </div>

<div class="container">
    <div style="background: linear-gradient(135deg, #1a1a1a, #2a2a2a); border: 4px solid #C33; border-radius: 12px; padding: 25px; margin-bottom: 30px; text-align: center;">
        <h1 style="font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: #C33; margin-bottom: 10px; letter-spacing: 4px;">RECENTLY PLAYED</h1>
        <p style="color: rgba(255,255,255,0.9); font-size: 1rem; margin-bottom: 8px;">Browse recent tracks or search to explore our catalog</p>
        <p style="color: rgba(255,255,255,0.7); font-size: 0.85rem; font-style: italic;">Note: Search dynamically queries our full requestable library</p>
    </div>

    <div class="loading" id="loadingState">
        <div class="searching-spinner" style="margin: 0 auto 20px;"></div>
        <div>Loading recently played tracks...</div>
    </div>
    <div class="catalog-grid" id="catalogGrid" style="display:none;"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-text">No tracks found</div>
    </div>
</div>

<div class="status-message" id="statusMessage"></div>

<script>
    let allTracks = [];
    let filteredTracks = [];

    async function loadCatalog() {
        try {
            document.getElementById('loadingState').textContent = 
                'Loading recently played tracks...';

            let historyItems = [];

            // Try multiple endpoints
            const endpoints = [
                'https://a10.asurahosting.com/public/northern_dial/history',
                'https://a10.asurahosting.com/api/station/northern_dial/history?rows=100',
                'https://a10.asurahosting.com/api/nowplaying/northern_dial'
            ];

            for (const endpoint of endpoints) {
                try {
                    console.log(`Trying: ${endpoint}`);
                    const response = await fetch(endpoint);
                    
                    if (response.ok) {
                        const data = await response.json();
                        
                        // Handle different response formats
                        if (Array.isArray(data)) {
                            historyItems = data;
                        } else if (data.rows) {
                            historyItems = data.rows;
                        } else if (data.song_history) {
                            historyItems = data.song_history;
                        }
                        
                        if (historyItems.length > 0) {
                            console.log(`✓ Success! Got ${historyItems.length} songs from ${endpoint}`);
                            break;
                        }
                    }
                } catch (e) {
                    console.log(`✗ Failed: ${endpoint}`, e);
                }
            }

            if (historyItems.length === 0) {
                throw new Error('No songs available from any endpoint');
            }

            console.log(`Total history items: ${historyItems.length}`);

            // Extract unique tracks
            const uniqueTracks = [];
            const seenIds = new Set();

            historyItems.forEach(item => {
                const song = item.song || {};
                const songId = song.song_id || song.id || song.unique_id;
                
                if (!seenIds.has(songId) && song.title) {
                    seenIds.add(songId);
                    uniqueTracks.push({
                        id: songId,
                        title: song.title || 'Unknown Track',
                        artist: song.artist || 'Unknown Artist',
                        art: song.art || '',
                        played_at: item.played_at || Date.now() / 1000,
                        request_url: `/api/station/northern_dial/request/${songId}`
                    });
                }
            });

            console.log(`Unique tracks: ${uniqueTracks.length}`);

            if (uniqueTracks.length === 0) {
                throw new Error('No valid tracks found');
            }

            // Sort by most recently played
            allTracks = uniqueTracks.sort((a, b) => b.played_at - a.played_at);

            filteredTracks = [...allTracks];
            displayCatalog(filteredTracks);
            updateCatalogCount(filteredTracks.length);

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('catalogGrid').style.display = 'grid';

        } catch (error) {
            console.error('Error loading recent plays:', error);
            document.getElementById('loadingState').innerHTML = 
                '<div style="color:#C33;">Unable to load enough recent plays from the API.<br><br>The station\'s API only provides access to ~5 recent songs.<br><br><a href="index.html" style="color:#C33; text-decoration:underline;">← Return home</a></div>';
        }
    }

    function displayCatalog(tracks) {
        const grid = document.getElementById('catalogGrid');
        const emptyState = document.getElementById('emptyState');

        if (tracks.length === 0) {
            grid.style.display = 'none';
            emptyState.style.display = 'block';
            return;
        }

        grid.style.display = 'grid';
        emptyState.style.display = 'none';

        grid.innerHTML = tracks.map(track => `
            <div class="album-card">
                ${track.art ? 
                    `<img src="${track.art}" alt="${track.title}" class="album-art" onerror="this.outerHTML='<div class=\\'album-art-placeholder\\'>♪</div>'">` :
                    `<div class="album-art-placeholder">♪</div>`
                }
                <div class="album-title">${escapeHtml(track.title)}</div>
                <div class="album-artist">${escapeHtml(track.artist)}</div>
                <button class="request-btn" onclick="requestTrack('${escapeHtml(track.request_url)}', this)">
                    Request
                </button>
            </div>
        `).join('');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function updateCatalogCount(count, isSearch = false) {
        const countEl = document.getElementById('catalogCount');
        if (isSearch) {
            countEl.textContent = count === 0 ? 'No results' : `${count.toLocaleString()} results`;
        } else {
            countEl.textContent = `${count.toLocaleString()} recently played tracks`;
        }
    }

    function searchCatalog(query) {
        const searchTerm = query.toLowerCase().trim();

        if (!searchTerm) {
            // No search - reload initial 5 recent songs
            loadCatalog();
            return;
        }

        // Dynamic search of full catalog (like request modal)
        document.getElementById('catalogGrid').innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:60px;"><div class="searching-spinner" style="margin: 0 auto 20px;"></div><div style="color:#999; font-size:1.1rem;">Searching catalog...</div></div>';

        fetch(`https://a10.asurahosting.com/api/station/northern_dial/requests?searchPhrase=${encodeURIComponent(searchTerm)}&rowCount=100&current=1`)
            .then(response => {
                if (!response.ok) throw new Error('Search failed');
                return response.json();
            })
            .then(data => {
                const songs = data.rows || data.result || data.results || [];
                console.log(`Search results for "${searchTerm}": ${songs.length}`);

                if (songs.length === 0) {
                    displayCatalog([]);
                    updateCatalogCount(0, true);
                    return;
                }

                // Convert to track format
                const searchResults = [];
                const seenIds = new Set();

                songs.forEach(item => {
                    const song = item.song || item;
                    const songId = song.song_id || song.id;
                    
                    if (!seenIds.has(songId)) {
                        seenIds.add(songId);
                        searchResults.push({
                            id: songId,
                            title: song.title || 'Unknown Title',
                            artist: song.artist || 'Unknown Artist',
                            art: song.art || song.album_art || '',
                            request_url: item.request_url
                        });
                    }
                });

                filteredTracks = searchResults;
                displayCatalog(filteredTracks);
                updateCatalogCount(filteredTracks.length, true);
            })
            .catch(error => {
                console.error('Search error:', error);
                document.getElementById('catalogGrid').innerHTML = 
                    '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#C33;">Search failed. Please try again.</div>';
            });
    }

    async function requestTrack(requestUrl, button) {
        // Construct full URL - handle both relative and absolute URLs
        let fullUrl;
        if (requestUrl.startsWith('http')) {
            fullUrl = requestUrl;
        } else if (requestUrl.startsWith('/api')) {
            fullUrl = 'https://a10.asurahosting.com' + requestUrl;
        } else {
            fullUrl = 'https://a10.asurahosting.com/api/station/northern_dial/request/' + requestUrl;
        }

        button.disabled = true;
        button.textContent = 'Requesting...';

        try {
            await fetch(fullUrl, {
                method: 'POST',
                headers: { 'Accept': 'application/json' }
            });

            showStatus('✓ Request submitted! Your song will play soon.', 'success');
            button.textContent = 'Requested ✓';
            
            setTimeout(() => {
                button.disabled = false;
                button.textContent = 'Request';
            }, 3000);

        } catch (error) {
            // CORS blocks reading response but request goes through
            showStatus('✓ Request submitted! Your song will play soon.', 'success');
            button.textContent = 'Requested ✓';
            
            setTimeout(() => {
                button.disabled = false;
                button.textContent = 'Request';
            }, 3000);
        }
    }

    function showStatus(message, type = 'success') {
        const statusEl = document.getElementById('statusMessage');
        statusEl.textContent = message;
        statusEl.className = 'status-message show' + (type === 'error' ? ' error' : '');

        setTimeout(() => {
            statusEl.classList.remove('show');
        }, 4000);
    }

    function updateBackgroundGradient() {
        const scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
        const clampedPercent = Math.min(Math.max(scrollPercent, 0), 1);
        
        // Gradient from deep red to white
        const r = Math.round(204 + (255 - 204) * clampedPercent);
        const g = Math.round(51 + (255 - 51) * clampedPercent);
        const b = Math.round(51 + (255 - 51) * clampedPercent);
        
        document.body.style.background = `rgb(${r}, ${g}, ${b})`;
    }

    // Search input handler with debounce
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            searchCatalog(e.target.value);
        }, 300);
    });

    // Scroll gradient effect
    window.addEventListener('scroll', updateBackgroundGradient);

    // Initialize
    loadCatalog();
    updateBackgroundGradient();
</script>

</body>
</html>
