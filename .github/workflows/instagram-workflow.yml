name: Instagram Post Generator

on:
  schedule:
    # Run every hour at minute 0
    - cron: '*/30 * * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  generate-instagram-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full history for commits
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow
      
      - name: Run Instagram generator
        run: |
          python instagram_generator.py
      
      - name: Commit and push if changes
        run: |
          git config user.name "Northern Dial Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add any new or modified files
          git add instagram-posts/ instagram_state.json
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎵 Generated Instagram post - $(date '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Changes committed and pushed"
          fi
      
      - name: Create notification (optional)
        if: success()
        run: |
          # This step runs after successful post generation
          # You can add email/Discord/Slack notifications here
          echo "Post generation completed successfully!"
