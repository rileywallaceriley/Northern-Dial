<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Dial - Instagram Post Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            color: #000;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            width: 150px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: #C33;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #999;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(195, 51, 51, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }

        .stat-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            color: #C33;
            line-height: 1;
        }

        .stat-label {
            font-size: 1rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #C33, #ff6666);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: #C33;
            letter-spacing: 3px;
            margin-bottom: 20px;
            border-left: 5px solid #C33;
            padding-left: 15px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(195, 51, 51, 0.2);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-5px);
            border-color: #C33;
            box-shadow: 0 10px 30px rgba(195, 51, 51, 0.3);
        }

        .post-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: #000;
        }

        .post-images img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }

        .post-info {
            padding: 20px;
        }

        .post-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #C33;
            margin-bottom: 10px;
        }

        .post-date {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 15px;
        }

        .post-songs {
            font-size: 0.85rem;
            color: #ccc;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .post-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px 20px;
            border: 2px solid #C33;
            background: transparent;
            color: #C33;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn:hover {
            background: #C33;
            color: white;
        }

        .btn-primary {
            background: #C33;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6666;
            border-color: #ff6666;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 1.2rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(195, 51, 51, 0.2);
            border-top-color: #C33;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 1.5rem;
            color: #999;
            margin-bottom: 10px;
        }

        .empty-subtext {
            color: #666;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .stat-number { font-size: 3rem; }
            .posts-grid { grid-template-columns: 1fr; }
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .modal.show {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            border: 3px solid #C33;
            border-radius: 12px;
            max-width: 900px;
            width: 100%;
            padding: 40px;
            position: relative;
            margin: auto;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #C33;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #ff6666;
            transform: rotate(90deg);
        }

        .modal-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: #C33;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .modal-date {
            color: #999;
            font-size: 1rem;
        }

        .images-preview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .image-container {
            position: relative;
            border: 2px solid rgba(195, 51, 51, 0.3);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        .image-container img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }

        .image-label {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(195, 51, 51, 0.9);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .download-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-container:hover .download-overlay {
            opacity: 1;
        }

        .download-btn-small {
            width: 100%;
            padding: 6px;
            background: #C33;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .download-btn-small:hover {
            background: #ff6666;
        }

        .caption-section {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(195, 51, 51, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .caption-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .caption-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #C33;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .copy-btn {
            padding: 8px 16px;
            background: transparent;
            border: 2px solid #C33;
            color: #C33;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #C33;
            color: white;
        }

        .copy-btn.copied {
            background: #00cc00;
            border-color: #00cc00;
            color: white;
        }

        .caption-text {
            background: #000;
            padding: 15px;
            border-radius: 6px;
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #ccc;
            max-height: 300px;
            overflow-y: auto;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-large {
            padding: 15px 30px;
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .modal-content {
                padding: 20px;
            }

            .images-preview {
                grid-template-columns: repeat(2, 1fr);
            }

            .modal-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://i.imgur.com/XIAPd0N.png" alt="Northern Dial" class="logo">
            <h1>Instagram Post Manager</h1>
            <p class="subtitle">Automated content generation for Northern Dial Radio</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="trackedCount">-</div>
                <div class="stat-label">Songs Tracked</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 0%">0/5</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-number" id="postsGenerated">-</div>
                <div class="stat-label">Posts Generated</div>
            </div>

            <div class="stat-card">
                <div class="stat-number" id="nowPlaying">-</div>
                <div class="stat-label">Now Playing</div>
            </div>
        </div>

        <h2 class="section-title">Generated Posts</h2>
        
        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <div>Loading posts...</div>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">📸</div>
            <div class="empty-text">No posts generated yet</div>
            <div class="empty-subtext">Posts will appear here after 5 songs have played</div>
        </div>

        <div id="postsGrid" class="posts-grid" style="display: none;"></div>
    </div>

    <!-- Modal for viewing full post -->
    <div id="postModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Post #1</div>
                <div class="modal-date" id="modalDate">March 5, 2026</div>
            </div>

            <div class="images-preview" id="modalImages">
                <!-- Images will be inserted here -->
            </div>

            <div class="caption-section">
                <div class="caption-header">
                    <div class="caption-title">Caption</div>
                    <button class="copy-btn" id="copyBtn" onclick="copyCaption()">Copy</button>
                </div>
                <div class="caption-text" id="modalCaption">
                    <!-- Caption will be inserted here -->
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-primary btn-large" onclick="downloadAllImages()">📥 Download All Images</button>
                <a class="btn btn-large" id="githubLink" href="#" target="_blank">View on GitHub</a>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'rileywallaceriley/Northern-Dial'; // Update this to your repo
        const GITHUB_BRANCH = 'main'; // or 'master'
        const API_BASE = `https://api.github.com/repos/${GITHUB_REPO}/contents`;

        async function loadState() {
            try {
                const response = await fetch(`${API_BASE}/instagram_state.json?ref=${GITHUB_BRANCH}`);
                if (!response.ok) throw new Error('State file not found');
                
                const data = await response.json();
                const content = JSON.parse(atob(data.content));
                
                // Update stats
                const trackedCount = content.tracked_songs?.length || 0;
                document.getElementById('trackedCount').textContent = trackedCount;
                document.getElementById('postsGenerated').textContent = content.post_count || 0;
                
                // Update progress bar
                const percentage = (trackedCount / 5) * 100;
                const progressBar = document.getElementById('progressBar');
                progressBar.style.width = percentage + '%';
                progressBar.textContent = `${trackedCount}/5`;
                
                return content;
            } catch (error) {
                console.error('Error loading state:', error);
                return null;
            }
        }

        async function loadNowPlaying() {
            try {
                const response = await fetch('https://a10.asurahosting.com/api/nowplaying/northern_dial');
                const data = await response.json();
                
                if (data.now_playing?.song) {
                    const song = data.now_playing.song;
                    document.getElementById('nowPlaying').textContent = `${song.artist} - ${song.title}`;
                }
            } catch (error) {
                console.error('Error loading now playing:', error);
                document.getElementById('nowPlaying').textContent = 'N/A';
            }
        }

        async function loadPosts() {
            try {
                const response = await fetch(`${API_BASE}/instagram-posts?ref=${GITHUB_BRANCH}`);
                if (!response.ok) {
                    // No posts folder yet
                    showEmptyState();
                    return;
                }
                
                const folders = await response.json();
                const postFolders = folders.filter(item => item.type === 'dir' && item.name.startsWith('post_'));
                
                if (postFolders.length === 0) {
                    showEmptyState();
                    return;
                }
                
                // Sort by newest first
                postFolders.sort((a, b) => b.name.localeCompare(a.name));
                
                // Load each post's info
                const posts = await Promise.all(
                    postFolders.slice(0, 12).map(folder => loadPostInfo(folder.name))
                );
                
                displayPosts(posts.filter(p => p !== null));
                
            } catch (error) {
                console.error('Error loading posts:', error);
                showEmptyState();
            }
        }

        async function loadPostInfo(folderName) {
            try {
                const infoResponse = await fetch(`${API_BASE}/instagram-posts/${folderName}/post_info.json?ref=${GITHUB_BRANCH}`);
                const infoData = await infoResponse.json();
                const postInfo = JSON.parse(atob(infoData.content));
                
                // Get first 3 images
                const imageUrls = [];
                for (let i = 1; i <= 3; i++) {
                    try {
                        const imgResponse = await fetch(`${API_BASE}/instagram-posts/${folderName}/image_${i}.jpg?ref=${GITHUB_BRANCH}`);
                        const imgData = await imgResponse.json();
                        imageUrls.push(imgData.download_url);
                    } catch (e) {
                        console.error(`Error loading image ${i}:`, e);
                    }
                }
                
                return {
                    ...postInfo,
                    folderName,
                    imageUrls
                };
            } catch (error) {
                console.error(`Error loading post ${folderName}:`, error);
                return null;
            }
        }

        function displayPosts(posts) {
            const grid = document.getElementById('postsGrid');
            grid.innerHTML = '';
            
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                
                const imagesHtml = post.imageUrls.slice(0, 3).map(url => 
                    `<img src="${url}" alt="Album cover" loading="lazy">`
                ).join('');
                
                const songsHtml = post.songs.slice(0, 3).map((song, i) => 
                    `${i + 1}. ${song.artist} - ${song.title}`
                ).join('<br>');
                
                const date = new Date(post.created_at).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                card.innerHTML = `
                    <div class="post-images">
                        ${imagesHtml}
                    </div>
                    <div class="post-info">
                        <div class="post-title">Post #${post.post_number}</div>
                        <div class="post-date">${date}</div>
                        <div class="post-songs">${songsHtml}<br>+ 2 more songs</div>
                        <div class="post-actions">
                            <a href="https://github.com/${GITHUB_REPO}/tree/${GITHUB_BRANCH}/instagram-posts/${post.folderName}" 
                               target="_blank" class="btn">GitHub</a>
                            <button class="btn btn-primary" onclick="viewPost('${post.folderName}')">📥 Download</button>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
            
            document.getElementById('loadingState').style.display = 'none';
            grid.style.display = 'grid';
        }

        function showEmptyState() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
        }

        function viewPost(folderName) {
            loadFullPost(folderName);
        }

        let currentPost = null;

        async function loadFullPost(folderName) {
            try {
                // Load post info
                const infoResponse = await fetch(`${API_BASE}/instagram-posts/${folderName}/post_info.json?ref=${GITHUB_BRANCH}`);
                const infoData = await infoResponse.json();
                const postInfo = JSON.parse(atob(infoData.content));
                
                // Load all 5 images
                const imageUrls = [];
                for (let i = 1; i <= 5; i++) {
                    try {
                        const imgResponse = await fetch(`${API_BASE}/instagram-posts/${folderName}/image_${i}.jpg?ref=${GITHUB_BRANCH}`);
                        const imgData = await imgResponse.json();
                        imageUrls.push({
                            url: imgData.download_url,
                            number: i
                        });
                    } catch (e) {
                        console.error(`Error loading image ${i}:`, e);
                    }
                }
                
                currentPost = {
                    ...postInfo,
                    folderName,
                    imageUrls
                };
                
                displayModal(currentPost);
                
            } catch (error) {
                console.error('Error loading full post:', error);
                alert('Error loading post details. Please try again.');
            }
        }

        function displayModal(post) {
            // Set title and date
            document.getElementById('modalTitle').textContent = `Post #${post.post_number}`;
            
            const date = new Date(post.created_at).toLocaleDateString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('modalDate').textContent = date;
            
            // Display all images with download buttons
            const imagesContainer = document.getElementById('modalImages');
            imagesContainer.innerHTML = '';
            
            post.imageUrls.forEach(img => {
                const container = document.createElement('div');
                container.className = 'image-container';
                container.innerHTML = `
                    <div class="image-label">Image ${img.number}</div>
                    <img src="${img.url}" alt="Album cover ${img.number}" loading="lazy">
                    <div class="download-overlay">
                        <button class="download-btn-small" onclick="downloadImage('${img.url}', ${img.number})">
                            Download
                        </button>
                    </div>
                `;
                imagesContainer.appendChild(container);
            });
            
            // Display caption
            document.getElementById('modalCaption').textContent = post.caption;
            
            // Set GitHub link
            document.getElementById('githubLink').href = 
                `https://github.com/${GITHUB_REPO}/tree/${GITHUB_BRANCH}/instagram-posts/${post.folderName}`;
            
            // Show modal
            document.getElementById('postModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('show');
            currentPost = null;
        }

        function downloadImage(url, number) {
            const link = document.createElement('a');
            link.href = url;
            link.download = `northern-dial-image-${number}.jpg`;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function downloadAllImages() {
            if (!currentPost) return;
            
            // Download images one by one with a small delay
            for (let i = 0; i < currentPost.imageUrls.length; i++) {
                const img = currentPost.imageUrls[i];
                downloadImage(img.url, img.number);
                
                // Small delay between downloads to avoid browser blocking
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            // Also trigger caption download
            downloadCaption();
        }

        function downloadCaption() {
            if (!currentPost) return;
            
            const blob = new Blob([currentPost.caption], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'caption.txt';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function copyCaption() {
            if (!currentPost) return;
            
            navigator.clipboard.writeText(currentPost.caption).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✓ Copied!';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy caption. Please copy manually.');
            });
        }

        // Close modal when clicking outside
        document.getElementById('postModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize
        async function init() {
            await Promise.all([
                loadState(),
                loadNowPlaying(),
                loadPosts()
            ]);
        }

        init();

        // Refresh data every 30 seconds
        setInterval(() => {
            loadState();
            loadNowPlaying();
        }, 30000);
    </script>
</body>
</html>
